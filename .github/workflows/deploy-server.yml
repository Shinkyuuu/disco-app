name: Deploy Server

on:
  push:
    branches: [main]
    paths-ignore:
      - 'client/**'
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: deploy-server
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/shinkyuuu/disco-app:latest
            ghcr.io/shinkyuuu/disco-app:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, Windows, disco-server]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
          sparse-checkout-cone-mode: false
      - shell: pwsh
        run: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker compose pull
          docker compose up -d
