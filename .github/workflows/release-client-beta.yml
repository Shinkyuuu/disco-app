name: Release Client (Beta)

on:
  push:
    branches: [develop]
    paths:
      - 'client/**'

permissions:
  contents: write

jobs:
  build-and-publish-beta:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Set beta version
        shell: bash
        run: |
          base=$(node -p "require('./package.json').version")
          npm version "${base}-beta.${{ github.run_number }}" --no-git-tag-version --allow-same-version
      - run: npm run build
      - run: npx electron-builder --win --publish always -c.publish.channel=beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
