<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>discord-echo</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- img-src must include Discord's CDN — speaker avatars load from
         https://cdn.discordapp.com and are blocked (broken-image icon) otherwise. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.discordapp.com"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
